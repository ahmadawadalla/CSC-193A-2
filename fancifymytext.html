<!DOCTYPE html>
<html>
<head>
    <title>Fancify Shamcify</title>

    <script src="fancifymytext.js"></script>
</head>

<body>
    <h1>Fancify my Text</h1>

    <!-- Text Area -->
    <fieldset>
        <legend>Text</legend>
        <textarea id="textInput" rows="4" cols="30"></textarea>
    </fieldset>

    <br>

    <!-- Controls -->
    <fieldset>
        <legend>Fancify</legend>

        <button onclick="makeBigger()">Bigger!</button>

        <br><br>

        <input type="radio" id="fancy" name="style" onchange="handleStyleChange()">
        <label for="fancy">FancyShmancy</label>

        <br>

        <input type="radio" id="boring" name="style" onchange="handleStyleChange()">
        <label for="boring">BoringBetty</label>

        <br><br>

        <button onclick="mooify()">Moo</button>

    </fieldset>

</body>
</html>
